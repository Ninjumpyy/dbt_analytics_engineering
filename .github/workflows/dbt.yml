name: dbt CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-duckdb

      - name: Create dbt profile (DuckDB)
        run: |
          mkdir -p .github/dbt
          cat > .github/dbt/profiles.yml << 'YAML'
          dbt_analytics_engineering:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: ./warehouse/jaffle.duckdb
                threads: 4
          YAML

      - name: dbt deps
        env:
          DBT_PROFILES_DIR: .github/dbt
        run: dbt deps

      - name: dbt build
        env:
          DBT_PROFILES_DIR: .github/dbt
        run: dbt build