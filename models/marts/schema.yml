version: 2

models:
  - name: dim_customers
    description: "One row per customer. Contains basic information about a customer, as well as some derived facts based on a customer's orders."

    columns:
      - name: customer_id
        description: "Unique identifier for a customer."
        tests:
          - unique
          - not_null
      
      - name: first_name
        description: "Customer's first name. PII."
      
      - name: last_name
        description: "Customer's last name. PII."

      - name: first_order
        description: "Date (UTC) of a customer's first order."
      
      - name: most_recent_order
        description: "Date (UTC) of a customer's most recent order."
      
      - name: number_of_orders
        description: "Count of the number of orders a customer has placed."
      
      - name: is_repeat_customer
        description: "Boolean flag indicating whether a customer has placed more than one order."
      
      - name: customer_lifetime_value
        description: "Total amount of all orders placed by a customer."
      
      - name: average_customer_order_value
        description: "Average amount of a customer's orders."

  - name: fct_orders
    description: "One row per order. Contains basic information about orders, as well as some derived facts based on payments."

    columns:
      - name: order_id
        description: "Unique identifier for an order."
        tests:
          - unique
          - not_null
      
      - name: customer_id
        description: "Identifier for the customer who placed the order. Foreign key to dim_customers.customer_id."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
        
      - name: order_date
        description: "Date (UTC) that the order was placed."
      
      - name: order_status
        description: '{{ doc("orders_status") }}'
        tests:
          - accepted_values:
              arguments:
                values: ['returned', 'shipped', 'placed','return_pending','completed']
      
      - name: credit_card_amount
        description: "Amount of the order paid via credit card."
        tests:
          - not_null
      
      - name: coupon_amount
        description: "Amount of the order paid via coupon."
        tests:
          - not_null
      
      - name: bank_transfer_amount
        description: "Amount of the order paid via bank transfer."
        tests:
          - not_null
      
      - name: gift_card_amount
        description: "Amount of the order paid via gift card."
        tests:
          - not_null
      
      - name: total_order_amount
        description: "Total amount of the order"
        tests:
          - not_null
      
      - name: number_of_payments
        description: "Count of the different payments associated with an order."
        tests:
          - not_null